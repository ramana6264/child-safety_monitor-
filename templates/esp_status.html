<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Device Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06111f;
            --panel: rgba(9, 19, 37, 0.76);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text: #eef4ff;
            --muted: #9eb0ca;
            --primary: #65d9ff;
            --secondary: #6c7cff;
            --accent: #ff7ab6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at 10% 10%, rgba(101, 217, 255, 0.16), transparent 24%),
                radial-gradient(circle at 85% 20%, rgba(108, 124, 255, 0.16), transparent 26%),
                radial-gradient(circle at 85% 85%, rgba(255, 122, 182, 0.14), transparent 28%),
                linear-gradient(160deg, #030712 0%, #08111f 42%, #0b1730 100%);
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 38px 38px;
            mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
            pointer-events: none;
        }

        .page-aurora {
            position: fixed;
            width: 28rem;
            height: 28rem;
            border-radius: 999px;
            filter: blur(74px);
            pointer-events: none;
            opacity: 0.48;
            z-index: 0;
            animation: drift 14s ease-in-out infinite;
        }

        .aurora-left {
            top: -8rem;
            left: -6rem;
            background: rgba(101, 217, 255, 0.24);
        }

        .aurora-right {
            right: -8rem;
            bottom: -8rem;
            background: rgba(255, 122, 182, 0.22);
            animation-delay: -4s;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 820px;
            background: linear-gradient(180deg, rgba(11, 20, 39, 0.88) 0%, rgba(7, 14, 27, 0.8) 100%);
            border: 1px solid var(--panel-border);
            border-radius: 26px;
            box-shadow: 0 28px 80px rgba(2, 8, 23, 0.45);
            backdrop-filter: blur(22px);
            padding: 30px;
            overflow: hidden;
            animation: riseIn 0.8s cubic-bezier(.2, .8, .2, 1);
        }

        .container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 18%, rgba(255, 255, 255, 0.07) 50%, transparent 82%);
            transform: translateX(-120%);
            animation: sheen 9s linear infinite;
            pointer-events: none;
        }

        h1,
        .map-title {
            font-family: 'Space Grotesk', sans-serif;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #f8fbff;
            font-size: clamp(2.1rem, 5vw, 3rem);
            letter-spacing: -0.03em;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            max-width: 560px;
            margin: 0 auto 22px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .back-link {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #f8fbff;
            background: linear-gradient(135deg, rgba(101, 217, 255, 0.22) 0%, rgba(108, 124, 255, 0.22) 48%, rgba(255, 122, 182, 0.22) 100%);
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 14px 36px rgba(5, 12, 25, 0.38);
            transition: transform 0.26s ease, box-shadow 0.26s ease;
        }

        .back-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.16) 50%, transparent 80%);
            transform: translateX(-130%);
            transition: transform 0.7s ease;
        }

        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 44px rgba(5, 12, 25, 0.48);
        }

        .back-link:hover::before {
            transform: translateX(130%);
        }

        .card,
        .map-card {
            position: relative;
            background: linear-gradient(180deg, rgba(14, 27, 49, 0.78) 0%, rgba(9, 19, 37, 0.62) 100%);
            border-radius: 22px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            margin-bottom: 16px;
            backdrop-filter: blur(18px);
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
        }

        .label {
            font-weight: 800;
            color: #dbe8ff;
        }

        .value {
            color: #f8fbff;
            font-weight: 700;
            text-align: right;
        }

        .status-pill {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            box-shadow: 0 10px 26px rgba(2, 8, 23, 0.22);
        }

        .attached {
            background: linear-gradient(135deg, #109669 0%, #59f0b2 100%);
        }

        .removed {
            background: linear-gradient(135deg, #dc2626 0%, #fb7185 100%);
        }

        .unknown {
            background: linear-gradient(135deg, #475569 0%, #94a3b8 100%);
        }

        .map-title {
            color: #f8fbff;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.18rem;
        }

        .map-frame {
            width: 100%;
            height: 260px;
            border: 0;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.16);
        }

        .map-link {
            display: inline-block;
            margin-top: 12px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 800;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .map-link:hover {
            color: #b9f4ff;
            transform: translateX(2px);
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(16px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes drift {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(0, 24px, 0) scale(1.05); }
        }

        @keyframes sheen {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(120%); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                border-radius: 20px;
            }

            .row {
                flex-direction: column;
                align-items: flex-start;
            }

            .value {
                text-align: left;
            }

            .map-frame {
                height: 220px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="page-aurora aurora-left"></div>
    <div class="page-aurora aurora-right"></div>
    <div class="container">
        <h1>📍 ESP Device Results</h1>
        <p class="subtitle">Attached-device health, last-known coordinates, and map visibility are shown in the same project dashboard system.</p>

        <div class="actions">
            <a href="/" class="back-link">← Back to Main Page</a>
        </div>

        <div class="card">
            <div class="row">
                <div class="label">Device Status</div>
                <div class="value" id="deviceStatus"></div>
            </div>
            <div class="row">
                <div class="label">Latitude</div>
                <div class="value" id="latValue"></div>
            </div>
            <div class="row">
                <div class="label">Longitude</div>
                <div class="value" id="lngValue"></div>
            </div>
            <div class="row" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
                <div class="label">Last Updated</div>
                <div class="value" id="updatedAt"></div>
            </div>
        </div>

        <div class="map-card">
            <div class="map-title">Live Location (Google Maps)</div>
            <iframe id="mapFrame" class="map-frame" loading="lazy"></iframe>
            <a id="mapLink" class="map-link" href="#" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
        </div>
    </div>

    <script id="initialStatusData" type="application/json">{{ status|tojson }}</script>
    <script>
        const initialStatus = JSON.parse(document.getElementById('initialStatusData').textContent || '{}');
        const DEFAULT_LAT = 17.405677517091238;
        const DEFAULT_LNG = 78.6207778;

        function normalizeLocation(status) {
            const rawLat = Number(status?.lat);
            const rawLng = Number(status?.lng);
            const latValid = Number.isFinite(rawLat) && rawLat !== 0;
            const lngValid = Number.isFinite(rawLng) && rawLng !== 0;

            if (latValid && lngValid) {
                return { lat: rawLat, lng: rawLng };
            }

            return { lat: DEFAULT_LAT, lng: DEFAULT_LNG };
        }

        function renderStatus(status) {
            const attached = status.attached;
            const location = normalizeLocation(status);
            const hasLocation = true;

            const statusEl = document.getElementById('deviceStatus');
            const latEl = document.getElementById('latValue');
            const lngEl = document.getElementById('lngValue');
            const updatedEl = document.getElementById('updatedAt');
            const mapFrame = document.getElementById('mapFrame');
            const mapLink = document.getElementById('mapLink');

            if (attached === true) {
                statusEl.innerHTML = '<span class="status-pill attached">ATTACHED</span>';
            } else if (attached === false) {
                statusEl.innerHTML = '<span class="status-pill removed">REMOVED</span>';
            } else {
                statusEl.innerHTML = '<span class="status-pill unknown">NO DATA</span>';
            }

            latEl.textContent = hasLocation ? Number(location.lat).toFixed(6) : 'No data';
            lngEl.textContent = hasLocation ? Number(location.lng).toFixed(6) : 'No data';
            updatedEl.textContent = status.updated_at || 'No updates yet';

            if (hasLocation) {
                const lat = Number(location.lat).toFixed(6);
                const lng = Number(location.lng).toFixed(6);
                const embedUrl = `https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed`;
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                mapFrame.src = embedUrl;
                mapLink.href = mapsUrl;
                mapLink.style.pointerEvents = 'auto';
                mapLink.style.opacity = '1';
            } else {
                mapFrame.src = 'about:blank';
                mapLink.href = '#';
                mapLink.style.pointerEvents = 'none';
                mapLink.style.opacity = '0.5';
            }
        }

        async function fetchLatestStatus() {
            try {
                const response = await fetch('/api/esp-status');
                const data = await response.json();
                if (data.success && data.data) {
                    renderStatus(data.data);
                }
            } catch (error) {
                console.error('Failed to fetch ESP status:', error);
            }
        }

        renderStatus(initialStatus);
        setInterval(fetchLatestStatus, 3000);
    </script>
</body>
</html>
